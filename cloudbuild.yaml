steps:
  # Step 1: Install dependencies and run the Config Validator
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'check-env']
    env:
      - 'NODE_ENV=production'

  # Step 2: Build the Docker image
  # We use the Project ID and Service Name as tags
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA', 
      '.'
    ]

  # Step 3: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA']

  # Step 4: Deploy to Cloud Run
  # This maps your Secret Manager secrets to Environment Variables at runtime
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sparkwavv-prod'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Mapping Secrets from Secret Manager to Env Vars
      - '--set-secrets=APP_URL=APP_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,SKYLAR_FROM_EMAIL=SKYLAR_FROM_EMAIL:latest,VERTEX_AI_SEARCH_ENGINE_ID=VERTEX_AI_SEARCH_ENGINE_ID:latest'

images:
  - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY