steps:
  # Step 0: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 1: Validate environment variables
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'check-env']
    secretEnv:
      - 'GEMINI_API_KEY'
      - 'SESSION_SECRET'
      - 'APP_URL'

  # Track 133: Secret Scanning (Gitleaks)
  - name: 'zricethezav/gitleaks:latest'
    entrypoint: 'gitleaks'
    args: ['detect', '--source=.', '--verbose', '--redact']

  # Step 2: Build the Docker image with Vite build arguments
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t gcr.io/$PROJECT_ID/sparkwavv:$COMMIT_SHA \
          --build-arg GEMINI_API_KEY=$$GEMINI_API_KEY \
          --build-arg SESSION_SECRET=$$SESSION_SECRET \
          --build-arg APP_URL=$$APP_URL \
          .
    secretEnv:
      - 'GEMINI_API_KEY'
      - 'SESSION_SECRET'
      - 'APP_URL'

  # Step 3: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sparkwavv:$COMMIT_SHA']

  # Track 133: Container Vulnerability Scan
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts docker images scan gcr.io/$PROJECT_ID/sparkwavv:$COMMIT_SHA --format="json" > scan_results.json
    allow_failure: true

  # Track 133: Security Gate Enforcement
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args: ['scripts/security-gate.sh', 'CRITICAL']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sparkwavv'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sparkwavv:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=APP_URL=APP_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest'

# Configuration for Secret Manager integration
availableSecrets:
  secretManager:
    - env: 'GEMINI_API_KEY'
      versionName: 'projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest'
    - env: 'SESSION_SECRET'
      versionName: 'projects/$PROJECT_ID/secrets/SESSION_SECRET/versions/latest'
    - env: 'APP_URL'
      versionName: 'projects/$PROJECT_ID/secrets/APP_URL/versions/latest'

options:
  dynamicSubstitutions: true
  logging: 'CLOUD_LOGGING_ONLY'
