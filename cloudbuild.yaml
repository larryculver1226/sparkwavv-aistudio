steps:
  # Step 1: Install dependencies
  # Required so the build environment has 'tsx' and your project files
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Run the Config Validator
  # We "inject" the secrets into this step's environment so the script can verify them
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'check-env']
    secretEnv:
      - 'GEMINI_API_KEY'
      - 'SESSION_SECRET'
      - 'APP_URL'
      - 'SKYLAR_FROM_EMAIL'
      - 'VERTEX_AI_SEARCH_ENGINE_ID'

  # Step 3: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA', 
      '.'
    ]

  # Step 4: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sparkwavv-prod'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # This maps the secrets to the LIVE production service
      - '--set-secrets=APP_URL=APP_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest,SKYLAR_FROM_EMAIL=SKYLAR_FROM_EMAIL:latest,VERTEX_AI_SEARCH_ENGINE_ID=VERTEX_AI_SEARCH_ENGINE_ID:latest'

# This section tells Cloud Build HOW to fetch the secrets from your "Vault"
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SESSION_SECRET/versions/latest
      env: 'SESSION_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/APP_URL/versions/latest
      env: 'APP_URL'
    - versionName: projects/$PROJECT_ID/secrets/SKYLAR_FROM_EMAIL/versions/latest
      env: 'SKYLAR_FROM_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/VERTEX_AI_SEARCH_ENGINE_ID/versions/latest
      env: 'VERTEX_AI_SEARCH_ENGINE_ID'

options:
  logging: CLOUD_LOGGING_ONLY