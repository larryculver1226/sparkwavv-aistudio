steps:
  # Step 1: Install dependencies
  # Required so the build container has 'tsx' to run the config validator
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Run the Config Validator (The "Bouncer")
  # This stops the build if any required secrets are missing from your vault
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'check-env']
    secretEnv:
      - 'GEMINI_API_KEY'
      - 'SESSION_SECRET'
      - 'APP_URL'
      - 'GOOGLE_MAPS_API_KEY'
      - 'VERTEX_AI_SEARCH_ENGINE_ID'
      - 'VERTEX_AI_VECTOR_SEARCH_INDEX_ID'

  # Step 3: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA', 
      '.'
    ]

  # Step 4: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sparkwavv-prod'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # CRITICAL: Secret Mapping
      # We map GEMINI_API_KEY to GOOGLE_GENAI_API_KEY to fix the Genkit chat error
      - '--set-secrets=APP_URL=APP_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GOOGLE_GENAI_API_KEY=GEMINI_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,VERTEX_AI_SEARCH_ENGINE_ID=VERTEX_AI_SEARCH_ENGINE_ID:latest,VERTEX_AI_VECTOR_SEARCH_INDEX_ID=VERTEX_AI_VECTOR_SEARCH_INDEX_ID:latest'

# This section tells Cloud Build where to find your secrets in Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SESSION_SECRET/versions/latest
      env: 'SESSION_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/APP_URL/versions/latest
      env: 'APP_URL'
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_MAPS_API_KEY/versions/latest
      env: 'GOOGLE_MAPS_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/VERTEX_AI_SEARCH_ENGINE_ID/versions/latest
      env: 'VERTEX_AI_SEARCH_ENGINE_ID'
    - versionName: projects/$PROJECT_ID/secrets/VERTEX_AI_VECTOR_SEARCH_INDEX_ID/versions/latest
      env: 'VERTEX_AI_VECTOR_SEARCH_INDEX_ID'

options:
  logging: CLOUD_LOGGING_ONLY