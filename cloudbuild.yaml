steps:
  # Step 0: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 1: Validate environment variables
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'check-env']
    secretEnv:
      - 'GEMINI_API_KEY'
      - 'SESSION_SECRET'
      - 'APP_URL'
      - 'GOOGLE_MAPS_API_KEY'
      - 'VERTEX_AI_SEARCH_ENGINE_ID'
      - 'VERTEX_AI_VECTOR_SEARCH_INDEX_ID'

  # Step 2: Build the Docker image with Vite build arguments
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID'
      - '.'
    secretEnv:
      - 'VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_PROJECT_ID'

  # Step 3: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sparkwavv-prod'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sparkwavv-prod:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=APP_URL=APP_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GOOGLE_GENAI_API_KEY=GEMINI_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,VERTEX_AI_SEARCH_ENGINE_ID=VERTEX_AI_SEARCH_ENGINE_ID:latest,VERTEX_AI_VECTOR_SEARCH_INDEX_ID=VERTEX_AI_VECTOR_SEARCH_INDEX_ID:latest'

# Configuration for Secret Manager integration
availableSecrets:
  secretManager:
    - env: 'GEMINI_API_KEY'
      versionName: 'projects/gen-lang-client-0883822731/secrets/GEMINI_API_KEY/versions/latest'
    - env: 'SESSION_SECRET'
      versionName: 'projects/gen-lang-client-0883822731/secrets/SESSION_SECRET/versions/latest'
    - env: 'APP_URL'
      versionName: 'projects/gen-lang-client-0883822731/secrets/APP_URL/versions/latest'
    - env: 'GOOGLE_MAPS_API_KEY'
      versionName: 'projects/gen-lang-client-0883822731/secrets/GOOGLE_MAPS_API_KEY/versions/latest'
    - env: 'VERTEX_AI_SEARCH_ENGINE_ID'
      versionName: 'projects/gen-lang-client-0883822731/secrets/VERTEX_AI_SEARCH_ENGINE_ID/versions/latest'
    - env: 'VERTEX_AI_VECTOR_SEARCH_INDEX_ID'
      versionName: 'projects/gen-lang-client-0883822731/secrets/VERTEX_AI_VECTOR_SEARCH_INDEX_ID/versions/latest'
    - env: 'VITE_FIREBASE_API_KEY'
      versionName: 'projects/gen-lang-client-0883822731/secrets/VITE_FIREBASE_API_KEY/versions/latest'
    - env: 'VITE_FIREBASE_PROJECT_ID'
      versionName: 'projects/gen-lang-client-0883822731/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest'

options:
  dynamicSubstitutions: true
  logging: 'CLOUD_LOGGING_ONLY'
